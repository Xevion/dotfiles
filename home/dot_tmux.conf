set -g default-command fish
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-kitty:Tc"
set -g mouse on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on

# Window/pane numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix: CTRL+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows keep current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi copy mode with clipboard integration
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

set -g status-position bottom
set -g status-interval 5

# Catppuccin Mocha
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Status line (set after catppuccin loads)
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Initialize TPM (keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
